app-id: com.github.yamada.vala-clicker
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: vala-clicker
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - name: libadwaita
    buildsystem: meson
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/libadwaita.git
        tag: '1.8.1'
  - name: vala-clicker
    buildsystem: meson
    sources:
      - type: dir
        path: .
