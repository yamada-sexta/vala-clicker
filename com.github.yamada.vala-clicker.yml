app-id: com.github.yamada.vala-clicker
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
command: vala-clicker
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - name: vala-clicker
    buildsystem: meson
    sources:
      - type: dir
        path: .
